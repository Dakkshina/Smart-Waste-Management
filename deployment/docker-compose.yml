version: "3.9"
# SmartWaste — Full Stack Docker Compose
# Usage: docker-compose up --build

services:

  # PostgreSQL ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: swm-db
    environment:
      POSTGRES_DB:       smart_waste_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../docs/DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [swm]

  # Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: swm-redis
    restart: unless-stopped
    networks: [swm]

  # Node.js Backend ───────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: swm-backend
    environment:
      NODE_ENV:       production
      PORT:           5000
      DB_HOST:        db
      DB_PORT:        5432
      DB_NAME:        smart_waste_db
      DB_USER:        postgres
      DB_PASSWORD:    ${DB_PASSWORD:-securepass}
      JWT_SECRET:     ${JWT_SECRET:-changeme_in_prod}
      AI_SERVICE_URL: http://ai-service:8000
      REDIS_URL:      redis://redis:6379
      CLIENT_URL:     https://smartwaste.in
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_started }
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks: [swm]

  # Python AI Microservice ────────────────────────────
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: swm-ai
    environment:
      MODEL_PATH:   models/yolov8_waste.pt
      REDIS_URL:    redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-securepass}@db:5432/smart_waste_db
    volumes:
      - ../ai-service/models:/app/models:ro
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_started }
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks: [swm]

  # Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: swm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    depends_on: [backend]
    restart: unless-stopped
    networks: [swm]

volumes:
  pgdata:

networks:
  swm:
    driver: bridge
